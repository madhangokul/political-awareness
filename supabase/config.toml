[api]
port = 54391
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54392
shadow_port = 54390
major_version = 15

[studio]
enabled = true
port = 54393

[inbucket]
enabled = true
port = 54394

[analytics]
enabled = true
port = 54395
vector_port = 54396

[storage]
enabled = true

[auth]
enabled = true
site_url = "http://127.0.0.1:5391"
additional_redirect_urls = ["https://localhost:5391"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10

[auth.email]
enable_signup = true
double_confirm_changes = false
enable_confirmations = false
